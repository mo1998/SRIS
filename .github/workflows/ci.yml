name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Run tests
        run: python -m pytest backend/tests -q

      - name: Validate migrations
        working-directory: backend
        env:
          DEBUG: 'True'
          SECRET_KEY: test-secret-key-for-migration-check
          DATABASE_URL: sqlite:////tmp/sris-ci-migration-check.db
        run: |
          rm -f /tmp/sris-ci-migration-check.db
          python -m alembic upgrade head

  frontend:
    name: Frontend Tests And Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run tests
        run: npm run test:run --prefix frontend

      - name: Build
        run: npm run build --prefix frontend

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run release candidate E2E smoke
        run: npm run test:e2e --prefix frontend

  docker-config:
    name: Docker Compose Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config