version: '3.8'

# Smart Remote Interview System - Docker Compose Configuration

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sris-postgres
    environment:
      POSTGRES_DB: sris_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sris-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d sris_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sris-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - sris-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sris-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/sris_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-this-in-production}
      DEBUG: ${DEBUG:-False}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@sris.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SERVER: ${MAIL_SERVER:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost","http://frontend"]}
      EVALUATION_QUEUE_BACKEND: ${EVALUATION_QUEUE_BACKEND:-rq}
      EVALUATION_QUEUE_NAME: ${EVALUATION_QUEUE_NAME:-evaluation}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sris-network
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; conn = http.client.HTTPConnection('localhost:8000'); conn.request('GET', '/health'); resp = conn.getresponse(); exit(0 if resp.status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  evaluation-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sris-evaluation-worker
    command: python -m app.worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/sris_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-this-in-production}
      EVALUATION_PROVIDER: ${EVALUATION_PROVIDER:-local_vllm}
      EVALUATION_QUEUE_BACKEND: rq
      EVALUATION_QUEUE_NAME: ${EVALUATION_QUEUE_NAME:-evaluation}
      EVALUATION_PROMPT_VERSION: ${EVALUATION_PROMPT_VERSION:-rubric-v1}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://localhost:8100/v1}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-qwen3-8b-awq}
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sris-network
    restart: unless-stopped

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sris-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - sris-network
    restart: unless-stopped

  # Database Migration Service
  db-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sris-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/sris_db
    command: python -m alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sris-network
    volumes:
      - backend_uploads:/app/uploads

# Volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local

# Networks
networks:
  sris-network:
    driver: bridge
